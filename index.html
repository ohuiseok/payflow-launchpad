<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayFlow — 서버 준비 중</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0c10;
      --surface:  #111318;
      --border:   #1e2128;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --accent:   #4f8ef7;
      --accent2:  #7c5cf7;
      --success:  #34d399;
      --track:    #1a1e27;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
    }

    /* glowing top edge */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      border-radius: 100%;
      opacity: 0.8;
    }

    /* logo / wordmark */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* heading */
    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* progress section */
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .progress-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--track);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 8px rgba(79,142,247,0.6);
    }

    .progress-fill.success {
      background: linear-gradient(90deg, var(--success), #059669);
      box-shadow: 0 0 8px rgba(52,211,153,0.6);
    }

    /* status line */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 20px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .dot.success { background: var(--success); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    #status {
      font-size: 14px;
      color: var(--muted);
    }

    /* elapsed timer */
    .elapsed {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #3a3f4d;
      margin-top: 28px;
      letter-spacing: 0.04em;
    }

    .elapsed span {
      color: #4a5060;
    }

    /* hint */
    .hint {
      margin-top: 28px;
      padding: 14px 16px;
      background: rgba(79,142,247,.05);
      border: 1px solid rgba(79,142,247,.12);
      border-radius: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 520px) {
      .card { padding: 36px 24px 28px; }
      h1 { font-size: 19px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .dot { animation: none; }
      .progress-fill { transition: none; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="brand-name">PayFlow</span>
    </div>

    <h1>시연 서버를 시작하고 있습니다</h1>
    <p class="subtitle">
      비용 절감을 위해 서버는 온디맨드로 운영됩니다.<br />
      준비가 완료되면 자동으로 이동합니다.
    </p>

    <div class="progress-header">
      <span class="progress-label">부팅 진행률</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="bar"></div>
    </div>

    <div class="status-row">
      <div class="dot" id="dot"></div>
      <span id="status">서버 상태 확인 중…</span>
    </div>

    <div class="elapsed">경과 <span id="elapsed">0:00</span> &nbsp;/&nbsp; 예상 ~5:00</div>

    <div class="hint">
      최초 요청 시 인스턴스 웜업에 최대 5분이 소요될 수 있습니다.<br />
      창을 닫아도 서버 부팅은 계속 진행됩니다.
    </div>
  </div>

  <script>
    const START_API  = "https://qw3uvkue4j.execute-api.ap-northeast-2.amazonaws.com/start";
    const HEALTH_URL = "https://www.pay-flow.cloud/health";
    const DEMO_URL   = "https://app.pay-flow.cloud";
    const MAX_SECONDS = 300; // 5분 = 100%

    let started     = null;   // Date of first real boot attempt
    let rafTimer    = null;
    let healthTimer = null;
    let redirecting = false;

    const barEl     = document.getElementById("bar");
    const pctEl     = document.getElementById("pct");
    const statusEl  = document.getElementById("status");
    const dotEl     = document.getElementById("dot");
    const elapsedEl = document.getElementById("elapsed");

    function fmt(sec) {
      const m = Math.floor(sec / 60);
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function setProgress(pct, success = false) {
      barEl.style.width = `${Math.min(pct, 100)}%`;
      pctEl.textContent = `${Math.round(Math.min(pct, 100))}%`;
      if (success) {
        barEl.classList.add("success");
        dotEl.classList.add("success");
        pctEl.style.color = "var(--success)";
      }
    }

    function tick() {
      if (!started || redirecting) return;
      const elapsed = Math.floor((Date.now() - started) / 1000);
      const pct     = (elapsed / MAX_SECONDS) * 100;
      elapsedEl.textContent = fmt(elapsed);
      setProgress(pct);
      rafTimer = setTimeout(tick, 1000);
    }

    async function onReady() {
      if (redirecting) return;
      redirecting = true;
      clearTimeout(rafTimer);
      clearTimeout(healthTimer);
      setProgress(100, true);
      statusEl.textContent = "서버 준비 완료! 이동합니다…";
      await new Promise(r => setTimeout(r, 2000));
      location.href = DEMO_URL;
    }

    async function checkHealth() {
      try {
        const res = await fetch(HEALTH_URL, { cache: "no-store" });
        if (res.ok) { onReady(); return; }
      } catch {}
      if (!redirecting) healthTimer = setTimeout(checkHealth, 5000);
    }

    async function quickCheck() {
      statusEl.textContent = "서버 상태 확인 중…";
      try {
        const res = await fetch(HEALTH_URL, { cache: "no-store" });
        if (res.ok) { onReady(); return; }
      } catch {}

      // Server is not up — start it
      statusEl.textContent = "서버를 깨우는 중…";
      started = Date.now();
      tick();

      try { await fetch(START_API, { method: "POST" }); } catch {}

      statusEl.textContent = "서버 부팅 중입니다. 잠시만 기다려주세요.";
      checkHealth();
    }

    quickCheck();
  </script>
</body>
</html>
